<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskBoard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h1>TaskBoard</h1>
      <p class="auth-subtitle">Sign in to manage your tasks</p>

      <div id="auth-error" class="auth-error"></div>

      <form id="login-form" class="auth-form">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log In</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input type="text" id="register-username" placeholder="Username" required>
        <input type="password" id="register-password" placeholder="Password (min 6 chars)" required>
        <button type="submit">Create Account</button>
      </form>

      <p class="auth-toggle">
        <span id="show-register">Need an account? Register</span>
        <span id="show-login" class="hidden">Already have an account? Log in</span>
      </p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app-screen" class="app-screen hidden">
    <header class="app-header">
      <h1>TaskBoard</h1>
      <div class="header-right">
        <span id="username-display"></span>
        <button id="new-task-btn" class="btn-primary">+ New Task</button>
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </header>

    <main class="board">
      <div class="column" data-status="todo">
        <h2>To Do <span class="count" id="count-todo">0</span></h2>
        <div class="task-list" id="list-todo"></div>
      </div>
      <div class="column" data-status="in_progress">
        <h2>In Progress <span class="count" id="count-in_progress">0</span></h2>
        <div class="task-list" id="list-in_progress"></div>
      </div>
      <div class="column" data-status="done">
        <h2>Done <span class="count" id="count-done">0</span></h2>
        <div class="task-list" id="list-done"></div>
      </div>
    </main>
  </div>

  <!-- Task modal -->
  <div id="task-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">New Task</h2>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <label>Title</label>
        <input type="text" id="task-title" required>

        <label>Description</label>
        <textarea id="task-description" rows="3"></textarea>

        <div class="form-row">
          <div>
            <label>Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div>
            <label>Due Date</label>
            <input type="date" id="task-due-date">
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="delete-task-btn" class="btn-danger hidden">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="cancel-task-btn" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
